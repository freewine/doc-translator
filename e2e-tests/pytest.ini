[pytest]
# Pytest configuration for E2E tests

# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    e2e: End-to-end tests requiring full system
    browser: Tests requiring browser automation
    api: API-only tests
    slow: Slow-running tests
    critical: Critical path tests

# Async support
asyncio_mode = auto

# Output options
addopts = 
    -v
    --tb=short

# Timeout settings
timeout = 300
timeout_method = thread