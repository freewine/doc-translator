version: 2
updates:
  # Backend Python dependencies
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10

  # Frontend npm dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10

  # ECS CDK npm dependencies
  - package-ecosystem: "npm"
    directory: "/ecs"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  # GitHub Actions (if any are added)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
