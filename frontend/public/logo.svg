<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background Card (English) -->
  <rect x="6" y="6" width="26" height="26" rx="4" fill="#4285F4" filter="url(#shadow)"/>
  <text x="19" y="25" font-family="Arial, sans-serif" font-size="18" fill="white" font-weight="bold" text-anchor="middle">A</text>
  
  <!-- Foreground Card (Chinese) -->
  <rect x="18" y="16" width="26" height="26" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow)"/>
  <text x="31" y="35" font-family="Arial, sans-serif" font-size="18" fill="#5F6368" font-weight="bold" text-anchor="middle">文</text>
</svg>
